name: Update Kaggle Sensor Dataset

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  update-dataset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Kaggle CLI
        run: |
          pip install kaggle

      - name: Configure Kaggle credentials
        run: |
          mkdir -p ~/.kaggle
          echo "{\"username\":\"${{ secrets.KAGGLE_USERNAME }}\",\"key\":\"${{ secrets.KAGGLE_KEY }}\"}" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Download dataset from Kaggle
        run: |
          kaggle datasets download -d garystafford/environmental-sensor-data-132k

      - name: Unzip dataset
        run: |
          unzip -o environmental-sensor-data-132k.zip

      - name: Upload CSV to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0
          files: |
            *.csv
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
